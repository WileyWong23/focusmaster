<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Celestial Focus - Active Session</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;700;800&amp;family=Inter:wght@300;400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-fixed-dim": "#ab93ff",
              "inverse-on-surface": "#4d556b",
              "secondary-fixed-dim": "#efc900",
              "on-tertiary": "#25006b",
              "on-error-container": "#ffb2b9",
              "outline": "#6d758c",
              "surface-variant": "#192540",
              "tertiary-container": "#7c4dff",
              "on-secondary-fixed-variant": "#665500",
              "secondary": "#ffd709",
              "error-container": "#a70138",
              "on-primary-fixed": "#003840",
              "primary": "#81ecff",
              "inverse-primary": "#006976",
              "surface-bright": "#1f2b49",
              "surface-container-high": "#141f38",
              "primary-container": "#00e3fd",
              "secondary-dim": "#efc900",
              "on-background": "#dee5ff",
              "tertiary": "#a68cff",
              "on-primary-fixed-variant": "#005762",
              "on-tertiary-fixed": "#1c0055",
              "surface": "#060e20",
              "surface-container-highest": "#192540",
              "on-tertiary-container": "#ffffff",
              "primary-fixed-dim": "#00d4ec",
              "surface-dim": "#060e20",
              "background": "#060e20",
              "tertiary-fixed": "#b8a3ff",
              "on-tertiary-fixed-variant": "#4000ad",
              "on-secondary-fixed": "#453900",
              "outline-variant": "#40485d",
              "on-surface": "#dee5ff",
              "surface-container-low": "#091328",
              "surface-container-lowest": "#000000",
              "error-dim": "#d73357",
              "inverse-surface": "#faf8ff",
              "primary-fixed": "#00e3fd",
              "error": "#ff6e84",
              "on-surface-variant": "#a3aac4",
              "surface-container": "#0f1930",
              "secondary-container": "#705d00",
              "on-secondary-container": "#fff7e6",
              "on-primary-container": "#004d57",
              "on-error": "#490013",
              "on-primary": "#005762",
              "surface-tint": "#81ecff",
              "secondary-fixed": "#ffd709",
              "tertiary-dim": "#7e51ff",
              "on-secondary": "#5b4b00",
              "primary-dim": "#00d4ec"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .starfield-bg {
            background: radial-gradient(circle at center, #091328 0%, #060e20 100%);
            position: relative;
            overflow: hidden;
        }
        .starfield-bg::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                radial-gradient(1px 1px at 20px 30px, #dee5ff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 40px 70px, #81ecff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, #a68cff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 80px 120px, #dee5ff, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 110px 210px, #81ecff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 150px 50px, #dee5ff, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 250px 250px;
            opacity: 0.2;
        }
        .timer-glow {
            box-shadow: 0 0 60px -15px rgba(129, 236, 255, 0.15);
        }
        .progress-orbit {
            border: 2px solid transparent;
            background: linear-gradient(#060e20, #060e20) padding-box,
                        linear-gradient(135deg, #a68cff, #81ecff) border-box;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container">
<div class="starfield-bg min-h-screen flex flex-col items-center justify-between py-12 px-6">
<!-- Header: Goal Identity -->
<header class="w-full flex justify-center pt-4">
<div class="flex flex-col items-center space-y-1">
<span class="font-label text-[10px] uppercase tracking-[0.2em] text-on-surface-variant font-bold">Focusing On</span>
<h1 class="font-headline text-lg font-bold text-primary tracking-tight">考研</h1>
</div>
</header>
<!-- Main Focus Timer -->
<main class="flex-1 flex flex-col items-center justify-center w-full max-w-lg">
<div class="relative group">
<!-- Progress Orbit Decoration -->
<div class="absolute inset-0 -m-8 rounded-full progress-orbit opacity-20 blur-sm"></div>
<!-- Central Timer Container -->
<div class="relative z-10 flex flex-col items-center justify-center aspect-square w-64 md:w-80 bg-surface-container-low/40 backdrop-blur-2xl rounded-full timer-glow">
<div class="text-center">
<span class="block font-headline text-7xl md:text-8xl font-extralight tracking-tighter text-on-surface">
                            55:00
                        </span>
<div class="mt-2 flex items-center justify-center space-x-2 text-on-surface-variant">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">timer</span>
<span class="font-label text-[10px] uppercase tracking-widest font-bold">Deep Session</span>
</div>
</div>
</div>
<!-- Visual Breathing Effect Base -->
<div class="absolute inset-0 -z-10 bg-primary/5 rounded-full blur-3xl scale-110"></div>
</div>
<!-- Quote/Affirmation (Subtle Editorial Touch) -->
<p class="mt-16 font-body text-sm text-on-surface-variant/60 italic text-center max-w-xs leading-relaxed">
                "The universe is quiet, and so is your mind."
            </p>
</main>
<!-- Action Controls -->
<footer class="w-full max-w-md flex flex-col space-y-8 items-center pb-8">
<!-- Contextual Warning -->
<div class="flex items-center space-x-2 px-4 py-2 bg-error-container/10 rounded-full">
<span class="material-symbols-outlined text-error text-xs">warning</span>
<p class="font-label text-[10px] text-error uppercase tracking-tight font-semibold">
                    Sessions under 5 mins will not be recorded
                </p>
</div>
<div class="flex flex-row items-center justify-center space-x-6 w-full px-4">
<!-- Secondary Action: Pause -->
<button class="flex-1 py-4 px-6 bg-surface-container-highest text-on-surface font-label text-xs uppercase tracking-widest font-bold rounded-xl hover:bg-surface-bright transition-all duration-300 active:scale-95 flex items-center justify-center space-x-2">
<span class="material-symbols-outlined text-lg">pause</span>
<span>Pause</span>
</button>
<!-- Primary Action: Finish -->
<button class="flex-[1.5] py-4 px-8 bg-gradient-to-br from-primary to-primary-dim text-on-primary font-label text-xs uppercase tracking-widest font-extrabold rounded-full shadow-[0_0_20px_rgba(129,236,255,0.2)] hover:shadow-[0_0_30px_rgba(129,236,255,0.4)] transition-all duration-300 active:scale-95 flex items-center justify-center space-x-2">
<span class="material-symbols-outlined text-lg">check_circle</span>
<span>Finish Session</span>
</button>
</div>
<!-- Hidden indicator for immersive mode -->
<div class="h-1 w-12 bg-on-surface/10 rounded-full mt-4"></div>
</footer>
</div>
<!-- Background Ambience Decoration -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-20 overflow-hidden">
<div class="absolute -top-1/4 -right-1/4 w-[600px] h-[600px] bg-tertiary/5 rounded-full blur-[120px]"></div>
<div class="absolute -bottom-1/4 -left-1/4 w-[600px] h-[600px] bg-primary/5 rounded-full blur-[120px]"></div>
</div>
</body></html>
