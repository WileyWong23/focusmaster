<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Manrope:wght@700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-fixed-dim": "#ab93ff",
              "inverse-on-surface": "#4d556b",
              "secondary-fixed-dim": "#efc900",

              "on-error-container": "#ffb2b9",
              "outline": "#6d758c",
              "surface-variant": "#192540",
              "tertiary-container": "#7c4dff",
              "on-secondary-fixed-variant": "#665500",
              "secondary": "#ffd709",
              "error-container": "#a70138",
              "on-primary-fixed": "#003840",
              "primary": "#81ecff",
              "inverse-primary": "#006976",
              "surface-bright": "#1f2b49",
              "surface-container-high": "#141f38",
              "primary-container": "#00e3fd",
              "secondary-dim": "#efc900",
              "on-background": "#dee5ff",
              "tertiary": "#a68cff",
              "on-primary-fixed-variant": "#005762",
              "on-tertiary-fixed": "#1c0055",
              "surface": "#060e20",
              "surface-container-highest": "#192540",
              "on-tertiary-container": "#ffffff",
              "primary-fixed-dim": "#00d4ec",
              "surface-dim": "#060e20",
              "background": "#060e20",
              "tertiary-fixed": "#b8a3ff",
              "on-tertiary-fixed-variant": "#4000ad",
              "on-secondary-fixed": "#453900",
              "outline-variant": "#40485d",
              "on-surface": "#dee5ff",
              "surface-container-low": "#091328",
              "surface-container-lowest": "#000000",
              "error-dim": "#d73357",
              "inverse-surface": "#faf8ff",
              "primary-fixed": "#00e3fd",
              "error": "#ff6e84",
              "on-surface-variant": "#a3aac4",
              "surface-container": "#0f1930",
              "secondary-container": "#705d00",
              "on-secondary-container": "#fff7e6",
              "on-primary-container": "#004d57",
              "on-error": "#490013",
              "on-primary": "#005762",
              "surface-tint": "#81ecff",
              "secondary-fixed": "#ffd709",
              "tertiary-dim": "#7e51ff",
              "on-secondary": "#5b4b00",
              "primary-dim": "#00d4ec"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .celestial-glow {
            background: radial-gradient(circle at center, rgba(255, 215, 9, 0.15) 0%, rgba(6, 14, 32, 0) 70%);
        }
        .rank-gradient-text {
            background: linear-gradient(135deg, #ffd709 0%, #efc900 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .glass-panel {
            background: rgba(25, 37, 64, 0.6);
            backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body selection:bg-primary/30 selection:text-primary min-h-screen flex flex-col items-center overflow-x-hidden">
<!-- Top Navigation (Shell Implementation) -->
<nav class="w-full top-0 sticky flex items-center justify-between px-6 py-4 bg-[#060e20] z-50">
<div class="text-xl font-bold tracking-tighter text-[#81ecff] font-headline">
            Celestial Focus
        </div>
<div class="flex items-center gap-4">
<div class="p-2 rounded-lg bg-[#141f38] text-[#81ecff] active:scale-95 duration-200 cursor-pointer">
<span class="material-symbols-outlined">military_tech</span>
</div>
<div class="w-8 h-8 rounded-full bg-surface-bright border border-outline-variant overflow-hidden">
<img class="w-full h-full object-cover" data-alt="Close-up portrait of a professional man in a tech environment with cinematic blue lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCJheJvGaobPvWklkIi0k3LW7Nky62HToPqDLqtJjAlfKBBEqytePWzfm4cqcnzX50tNKKadxqbVtNggpN9mWp9UkOJnyX-zixk3Pad_0tzc1udE8_rJci2n7Dlo0WcqBOBObu2kaDReTjIl62KDXzOnUTQJT1oxSuH7drc06qUkt170WDJ5crB74XLk7aRo65EydDLcQXIPuXi29dddQQPwzd3nWrO9s3TBA14TpwbCofFSM0p4dPgxHuZmdc9A2CfURSCC0zwCCA"/>
</div>
</div>
</nav>
<!-- Main Content: Rank-Up Celebration -->
<main class="flex-grow w-full max-w-4xl mx-auto px-6 py-12 flex flex-col items-center justify-center text-center relative">
<!-- Background Light Rays / Energy -->
<div class="absolute inset-0 celestial-glow pointer-events-none -z-10"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-secondary/5 rounded-full blur-[120px] pointer-events-none"></div>
<!-- Header -->
<div class="mb-4">
<span class="label-md uppercase tracking-[0.2em] font-bold text-secondary font-label">Achievement Unlocked</span>
<h1 class="text-5xl md:text-7xl font-headline font-extrabold tracking-tighter mt-2 text-on-surface">
                Rank Up! <span class="rank-gradient-text uppercase">GOLD</span>
</h1>
</div>
<!-- Hero 3D Badge Section -->
<div class="relative my-12 group">
<!-- Glow Orbit -->
<div class="absolute inset-0 rounded-full border-2 border-secondary/20 scale-125 animate-pulse"></div>
<div class="absolute inset-0 rounded-full border border-secondary/10 scale-150"></div>
<!-- Rank Badge Image Container -->
<div class="relative w-64 h-64 md:w-80 md:h-80 flex items-center justify-center bg-surface-container-high rounded-full shadow-[0_0_50px_rgba(255,215,9,0.2)]">
<div class="absolute inset-2 border border-secondary/20 rounded-full"></div>
<!-- Literal Representation of 3D Badge -->
<div class="relative z-10 scale-110">
<span class="material-symbols-outlined !text-[120px] md:!text-[160px] text-secondary" style="font-variation-settings: 'FILL' 1;">workspace_premium</span>
</div>
<!-- Particle Accents (Symbolic) -->
<div class="absolute top-4 right-10 text-secondary/40"><span class="material-symbols-outlined">auto_awesome</span></div>
<div class="absolute bottom-10 left-4 text-secondary/40"><span class="material-symbols-outlined">auto_awesome</span></div>
<div class="absolute top-20 left-0 text-secondary/60 scale-75"><span class="material-symbols-outlined">colors_spark</span></div>
</div>
</div>
<!-- Message -->
<p class="text-xl md:text-2xl font-medium text-on-surface-variant max-w-xl mb-12">
            You've reached Gold Rank! <span class="text-on-surface font-bold">Next: Platinum in 28h</span>
</p>
<!-- Stats Bento Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full mb-16">
<div class="glass-panel p-8 rounded-2xl flex flex-col items-center justify-center border-l-2 border-secondary/40">
<span class="label-md uppercase tracking-widest text-outline font-bold mb-2">This Session</span>
<div class="text-4xl font-headline font-extrabold text-on-surface">55m</div>
<div class="mt-4 flex items-center gap-2 text-secondary">
<span class="material-symbols-outlined text-sm">trending_up</span>
<span class="text-xs font-bold font-label uppercase">Above Average</span>
</div>
</div>
<div class="glass-panel p-8 rounded-2xl flex flex-col items-center justify-center border-l-2 border-primary/40">
<span class="label-md uppercase tracking-widest text-outline font-bold mb-2">Total Progress</span>
<div class="text-4xl font-headline font-extrabold text-on-surface">72h <span class="text-outline">/ 100h</span></div>
<div class="w-full h-1.5 bg-surface-container-highest rounded-full mt-6 overflow-hidden">
<div class="h-full bg-gradient-to-r from-secondary to-primary" style="width: 72%"></div>
</div>
</div>
</div>
<!-- Action Button -->
<div class="flex flex-col items-center gap-6">
<button class="bg-gradient-to-br from-primary to-primary-dim text-on-primary px-12 py-5 rounded-full font-bold text-lg shadow-[0_0_30px_rgba(129,236,255,0.3)] active:scale-95 transition-transform hover:brightness-110">
                Back to Home
            </button>
<button class="text-outline hover:text-on-surface transition-colors font-bold uppercase tracking-widest text-xs">
                View Full Leaderboard
            </button>
</div>
</main>
<!-- Bottom Navigation (Shell Implementation - Sub-page Context Check: Hidden on detailed summary) -->
<!-- Suppressed due to "Task-Focused" rule for summary screens -->
<!-- Decorative Corner Accents -->
<div class="fixed bottom-0 left-0 p-8 opacity-20 pointer-events-none hidden lg:block">
<span class="material-symbols-outlined !text-8xl text-secondary">flare</span>
</div>
<div class="fixed top-20 right-0 p-8 opacity-20 pointer-events-none hidden lg:block">
<span class="material-symbols-outlined !text-8xl text-primary">blur_on</span>
</div>
</body></html>
