<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>专注大师</title>
    <meta name="theme-color" content="#060e20">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="专注大师">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg: #060e20; --bg2: #0c1a35; --card: rgba(255,255,255,0.06);
            --card-hover: rgba(255,255,255,0.10); --border: rgba(255,255,255,0.08);
            --text: #e8ecf4; --text2: #8892a8; --text3: #4a5568;
            --primary: #81ecff; --primary2: #00d4ec; --gold: #ffd709;
            --purple: #a68cff; --red: #ff6e84; --green: #34d399;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
        h1,h2,h3,h4,h5 { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; user-select: none; }
        .material-symbols-outlined.filled { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

        /* Layout */
        #app { padding-bottom: 80px; min-height: 100vh; }
        .page { display: none; padding: 20px 20px 0; animation: fadeIn 0.25s ease; }
        .page.active { display: block; }
        .sub-page { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 50; background: var(--bg); overflow-y: auto; animation: slideInRight 0.3s ease; }
        .sub-page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes slideOutRight { from { transform: translateX(0); } to { transform: translateX(100%); } }
        @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(129,236,255,0.4); } 50% { box-shadow: 0 0 0 20px rgba(129,236,255,0); } }
        @keyframes glow { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }

        /* Tab Bar */
        #tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 64px; background: rgba(6,14,32,0.95); backdrop-filter: blur(20px); display: flex; border-top: 1px solid var(--border); z-index: 100; }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; color: var(--text3); text-decoration: none; transition: color 0.2s; cursor: pointer; }
        .tab-item.active { color: var(--primary); }
        .tab-item span:last-child { font-size: 11px; font-weight: 500; }

        /* Cards */
        .glass-card { background: var(--card); border-radius: 16px; padding: 20px; backdrop-filter: blur(12px); transition: background 0.2s; }
        .glass-card:hover { background: var(--card-hover); }

        /* Buttons */
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary2)); color: #060e20; border: none; border-radius: 12px; padding: 14px 28px; font-weight: 600; font-size: 16px; cursor: pointer; font-family: 'Manrope', sans-serif; transition: all 0.2s; }
        .btn-primary:active { transform: scale(0.97); }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .btn-secondary { background: var(--card); color: var(--text); border: none; border-radius: 12px; padding: 12px 24px; font-weight: 500; font-size: 14px; cursor: pointer; font-family: 'Manrope', sans-serif; }
        .btn-danger { background: rgba(255,110,132,0.15); color: var(--red); border: none; border-radius: 10px; padding: 10px 20px; font-weight: 500; font-size: 14px; cursor: pointer; }
        .btn-sm { padding: 8px 16px; font-size: 13px; border-radius: 8px; }

        /* Start Button */
        .start-btn { width: 160px; height: 160px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--primary2)); border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; color: #060e20; font-family: 'Manrope', sans-serif; animation: pulse 2s infinite; transition: transform 0.2s; box-shadow: 0 0 60px rgba(129,236,255,0.2); }
        .start-btn:active { transform: scale(0.95); }
        .start-btn .material-symbols-outlined { font-size: 48px; }
        .start-btn span:last-child { font-size: 18px; font-weight: 700; }
        .start-btn:disabled { opacity: 0.3; animation: none; cursor: not-allowed; }

        /* Rank Bar */
        .rank-bar { display: flex; align-items: center; justify-content: space-between; gap: 4px; padding: 12px 0; }
        .rank-item { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; position: relative; }
        .rank-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--text3); transition: all 0.3s; }
        .rank-dot.achieved { background: var(--text2); }
        .rank-dot.current { width: 14px; height: 14px; box-shadow: 0 0 12px currentColor; }
        .rank-label { font-size: 10px; color: var(--text3); white-space: nowrap; }
        .rank-label.current { color: var(--primary); font-weight: 600; }
        .rank-line { position: absolute; top: 5px; left: 50%; width: 100%; height: 2px; background: var(--text3); }
        .rank-line.filled { background: var(--text2); }
        .rank-item:last-child .rank-line { display: none; }

        /* Time Picker */
        .time-picker-container { padding: 10px 0; }
        .time-picker { display: flex; align-items: center; overflow-x: auto; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; gap: 0; scrollbar-width: none; padding: 8px 0; }
        .time-picker::-webkit-scrollbar { display: none; }
        .time-picker-item { flex-shrink: 0; width: 52px; text-align: center; padding: 8px 0; font-size: 18px; color: var(--text3); cursor: pointer; transition: all 0.15s; scroll-snap-align: center; border-radius: 8px; user-select: none; }
        .time-picker-item.selected { color: var(--primary); font-size: 28px; font-weight: 700; font-family: 'Manrope', sans-serif; transform: scale(1.1); }
        .time-picker-label { text-align: center; font-size: 12px; color: var(--text3); margin-top: 4px; }

        /* Bar Chart */
        .bar-chart { display: flex; align-items: flex-end; justify-content: space-between; height: 140px; gap: 8px; padding: 10px 0; }
        .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; height: 100%; justify-content: flex-end; }
        .bar { width: 100%; max-width: 36px; border-radius: 6px 6px 2px 2px; background: linear-gradient(180deg, var(--primary), var(--primary2)); transition: height 0.6s ease; min-height: 4px; position: relative; }
        .bar-value { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); font-size: 10px; color: var(--text2); white-space: nowrap; opacity: 0; transition: opacity 0.2s; }
        .bar-col:hover .bar-value, .bar-col:active .bar-value { opacity: 1; }
        .bar-label { font-size: 11px; color: var(--text3); }
        .bar-weekday { font-size: 10px; color: var(--text3); }

        /* Toast */
        .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(255,255,255,0.12); backdrop-filter: blur(20px); color: var(--text); padding: 12px 24px; border-radius: 12px; font-size: 14px; z-index: 999; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* Confirm Dialog */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; display: flex; align-items: center; justify-content: center; animation: fadeIn 0.2s; }
        .modal-box { background: var(--bg2); border-radius: 20px; padding: 28px; width: 85%; max-width: 320px; text-align: center; }
        .modal-box h3 { font-size: 18px; margin-bottom: 12px; }
        .modal-box p { font-size: 14px; color: var(--text2); margin-bottom: 24px; line-height: 1.5; }
        .modal-actions { display: flex; gap: 12px; }
        .modal-actions button { flex: 1; }

        /* Timer Page */
        .timer-display { font-family: 'Manrope', sans-serif; font-size: 72px; font-weight: 200; letter-spacing: 4px; color: var(--text); text-align: center; line-height: 1; }
        .timer-goal-name { font-size: 14px; color: var(--text2); text-align: center; margin-bottom: 4px; }

        /* Inputs */
        .input-field { background: var(--card); border: none; border-radius: 12px; padding: 14px 16px; color: var(--text); font-size: 16px; width: 100%; outline: none; font-family: 'Inter', sans-serif; transition: background 0.2s; }
        .input-field:focus { background: var(--card-hover); }
        .input-field::placeholder { color: var(--text3); }
        .input-label { font-size: 13px; color: var(--text2); margin-bottom: 8px; display: block; font-weight: 500; }

        /* Settings List */
        .settings-item { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
        .settings-item:last-child { border-bottom: none; }
        .settings-left { display: flex; align-items: center; gap: 12px; }
        .settings-left .material-symbols-outlined { color: var(--text2); font-size: 22px; }
        .settings-label { font-size: 15px; }
        .settings-right { color: var(--text3); }
        .settings-right .material-symbols-outlined { font-size: 18px; }

        /* Rank Preview */
        .rank-preview-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; }
        .rank-preview-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        .rank-preview-icon .material-symbols-outlined { font-size: 18px; }
        .rank-preview-info { flex: 1; }
        .rank-preview-name { font-size: 14px; font-weight: 600; }
        .rank-preview-desc { font-size: 11px; color: var(--text3); }
        .rank-preview-hours { font-size: 13px; color: var(--text2); font-weight: 500; }

        /* Status Badge */
        .badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-active { background: rgba(129,236,255,0.15); color: var(--primary); }
        .badge-completed { background: rgba(52,211,153,0.15); color: var(--green); }
        .badge-abandoned { background: rgba(255,110,132,0.15); color: var(--red); }

        /* Duration Options */
        .duration-options { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
        .duration-opt { padding: 10px 20px; border-radius: 10px; background: var(--card); color: var(--text2); border: none; cursor: pointer; font-size: 14px; font-weight: 500; font-family: 'Inter', sans-serif; transition: all 0.2s; }
        .duration-opt.active { background: rgba(129,236,255,0.15); color: var(--primary); }

        /* Rank Up Celebration */
        .celebration-bg { position: absolute; inset: 0; overflow: hidden; }
        .star-particle { position: absolute; width: 4px; height: 4px; background: var(--gold); border-radius: 50%; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%,100% { transform: translateY(0) scale(1); opacity: 0.3; } 50% { transform: translateY(-30px) scale(1.5); opacity: 1; } }

        /* Progress Bar */
        .progress-bar { height: 6px; background: var(--card); border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 0; height: 0; }
    </style>
</head>
<body>
    <!-- Tab Bar -->
    <nav id="tab-bar">
        <a class="tab-item active" data-tab="home" onclick="Router.go('home')">
            <span class="material-symbols-outlined">home</span>
            <span>首页</span>
        </a>
        <a class="tab-item" data-tab="goals" onclick="Router.go('goals')">
            <span class="material-symbols-outlined">flag</span>
            <span>目标</span>
        </a>
        <a class="tab-item" data-tab="my" onclick="Router.go('my')">
            <span class="material-symbols-outlined">person</span>
            <span>我的</span>
        </a>
    </nav>

    <!-- App Container -->
    <div id="app">
        <!-- Home Page -->
        <section id="page-home" class="page active"></section>
        <!-- Goals Page -->
        <section id="page-goals" class="page"></section>
        <!-- My Page -->
        <section id="page-my" class="page"></section>
    </div>

    <!-- Sub Pages -->
    <div id="page-create-goal" class="sub-page"></div>
    <div id="page-focus-timer" class="sub-page"></div>
    <div id="page-focus-done" class="sub-page"></div>
    <div id="page-rank-up" class="sub-page"></div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script>
    // ==================== Store ====================
    const Store = {
        userId: null,
        activeGoal: null,
        allGoals: null,
        selectedMinutes: 25,
        currentSession: null,
        timerInterval: null,
        timerStartedAt: null,
        timerPausedAt: null,
        timerPausedDuration: 0,
        isTimerRunning: false,
        isTimerPaused: false,

        async init() {
            let uuid = localStorage.getItem('device_uuid');
            if (!uuid) { uuid = crypto.randomUUID(); localStorage.setItem('device_uuid', uuid); }
            try {
                const res = await Api.post('/api/user/init', { deviceUuid: uuid });
                this.userId = res.data.id;
                localStorage.setItem('user_id', res.data.id);
            } catch(e) {
                const saved = localStorage.getItem('user_id');
                if (saved) this.userId = parseInt(saved);
            }
            await this.loadGoals();
        },

        async loadGoals() {
            const res = await Api.get('/api/goals');
            this.allGoals = res.data;
            this.activeGoal = res.data.activeGoal;
        }
    };

    // ==================== API ====================
    const Api = {
        async request(method, url, data) {
            const opts = { method, headers: { 'Content-Type': 'application/json' } };
            if (Store.userId) opts.headers['X-User-Id'] = Store.userId;
            if (data) opts.body = JSON.stringify(data);
            const res = await fetch(url, opts);
            const json = await res.json();
            if (json.code !== 200) throw new Error(json.message || '请求失败');
            return json;
        },
        get(url) { return this.request('GET', url); },
        post(url, data) { return this.request('POST', url, data); },
        put(url, data) { return this.request('PUT', url, data); }
    };

    // ==================== Router ====================
    const Router = {
        current: 'home',
        go(tab) {
            if (Store.isTimerRunning && tab !== 'home') return;
            this.current = tab;
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            const page = document.getElementById('page-' + tab);
            if (page) page.classList.add('active');
            const tabItem = document.querySelector(`.tab-item[data-tab="${tab}"]`);
            if (tabItem) tabItem.classList.add('active');
            location.hash = tab;
            this.render(tab);
        },
        async render(tab) {
            switch(tab) {
                case 'home': await HomePage.render(); break;
                case 'goals': await GoalsPage.render(); break;
                case 'my': await MyPage.render(); break;
            }
        },
        init() {
            const hash = location.hash.replace('#', '') || 'home';
            window.addEventListener('hashchange', () => {
                const h = location.hash.replace('#', '');
                if (['home','goals','my'].includes(h)) this.go(h);
            });
            Store.init().then(() => this.go(hash));
        }
    };

    // ==================== Toast ====================
    const Toast = {
        timer: null,
        show(msg) {
            const el = document.getElementById('toast');
            el.textContent = msg; el.classList.add('show');
            clearTimeout(this.timer);
            this.timer = setTimeout(() => el.classList.remove('show'), 2000);
        }
    };

    // ==================== Confirm Dialog ====================
    const Confirm = {
        show(title, message) {
            return new Promise(resolve => {
                const overlay = document.createElement('div');
                overlay.className = 'modal-overlay';
                overlay.innerHTML = `
                    <div class="modal-box">
                        <h3>${title}</h3>
                        <p>${message}</p>
                        <div class="modal-actions">
                            <button class="btn-secondary" onclick="this.closest('.modal-overlay').remove(); window.__confirmResolve(false)">取消</button>
                            <button class="btn-primary" style="padding:12px 20px" onclick="this.closest('.modal-overlay').remove(); window.__confirmResolve(true)">确定</button>
                        </div>
                    </div>`;
                document.body.appendChild(overlay);
                window.__confirmResolve = resolve;
            });
        }
    };

    // ==================== Rank Helpers ====================
    const RankHelper = {
        colors: { BRONZE:'#665500', SILVER:'#6d758c', GOLD:'#ffd709', PLATINUM:'#81ecff', DIAMOND:'#00d4ec', STARRY:'#a68cff', KING:'#ffd709' },
        names: { BRONZE:'青铜', SILVER:'白银', GOLD:'黄金', PLATINUM:'白金', DIAMOND:'钻石', STARRY:'星耀', KING:'王者' },
        icons: { BRONZE:'stars', SILVER:'verified', GOLD:'star', PLATINUM:'verified', DIAMOND:'diamond', STARRY:'auto_awesome', KING:'workspace_premium' },
        order: ['BRONZE','SILVER','GOLD','PLATINUM','DIAMOND','STARRY','KING'],

        getColor(rank) { return this.colors[rank] || '#81ecff'; },
        getName(rank) { return this.names[rank] || rank; },
        getIcon(rank) { return this.icons[rank] || 'stars'; },

        renderBar(currentRank, accumulatedMinutes, totalMinutes) {
            const currentIdx = this.order.indexOf(currentRank);
            let html = '<div class="rank-bar">';
            this.order.forEach((rank, i) => {
                const achieved = i <= currentIdx;
                const isCurrent = rank === currentRank;
                const color = achieved ? this.getColor(rank) : '';
                html += `<div class="rank-item">
                    ${i > 0 ? `<div class="rank-line ${i <= currentIdx ? 'filled' : ''}"></div>` : ''}
                    <div class="rank-dot ${achieved ? 'achieved' : ''} ${isCurrent ? 'current' : ''}" style="${achieved ? 'background:'+color+';' : ''} ${isCurrent ? 'color:'+color+';' : ''}"></div>
                    <span class="rank-label ${isCurrent ? 'current' : ''}" style="${isCurrent ? 'color:'+color+';' : ''}">${this.getName(rank)}</span>
                </div>`;
            });
            html += '</div>';
            return html;
        }
    };

    // ==================== Format Helpers ====================
    function formatMinutes(m) {
        if (!m && m !== 0) return '0分钟';
        const h = Math.floor(m / 60), min = m % 60;
        if (h > 0 && min > 0) return `${h}h ${min}min`;
        if (h > 0) return `${h}h`;
        return `${min}min`;
    }
    function formatTimerDisplay(seconds) {
        const h = Math.floor(seconds / 3600), m = Math.floor((seconds % 3600) / 60), s = seconds % 60;
        return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }
    function formatTimerDisplayShort(seconds) {
        const m = Math.floor(seconds / 60), s = seconds % 60;
        if (m > 0) return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        return `00:${String(s).padStart(2,'0')}`;
    }

    // ==================== Home Page ====================
    const HomePage = {
        async render() {
            const el = document.getElementById('page-home');
            const goal = Store.activeGoal;

            if (!goal) {
                el.innerHTML = `
                    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:70vh;gap:20px;">
                        <span class="material-symbols-outlined" style="font-size:64px;color:var(--text3);">psychology</span>
                        <p style="color:var(--text2);font-size:16px;">还没有进行中的目标</p>
                        <button class="btn-primary" onclick="Router.go('goals')">创建目标</button>
                    </div>`;
                return;
            }

            const progressPercent = goal.progressPercent || 0;
            const rankColor = RankHelper.getColor(goal.currentRank);
            const rankName = RankHelper.getName(goal.currentRank);

            el.innerHTML = `
                <div style="text-align:center;padding-top:20px;">
                    <h1 style="font-size:24px;font-weight:700;margin-bottom:8px;">${goal.name}</h1>
                    <span class="badge" style="background:${rankColor}22;color:${rankColor};font-size:13px;padding:4px 14px;border-radius:20px;">
                        <span class="material-symbols-outlined filled" style="font-size:14px;vertical-align:middle;margin-right:4px;">${RankHelper.getIcon(goal.currentRank)}</span>
                        ${rankName}
                    </span>
                    <p style="color:var(--text2);font-size:13px;margin-top:10px;">已累计 ${formatMinutes(goal.accumulatedMinutes)} / 目标 ${formatMinutes(goal.totalMinutes)}</p>
                    <div class="progress-bar" style="margin-top:10px;max-width:280px;margin-left:auto;margin-right:auto;">
                        <div class="progress-fill" style="width:${progressPercent}%;background:linear-gradient(90deg,${rankColor},${rankColor}88);"></div>
                    </div>
                </div>

                <div style="display:flex;flex-direction:column;align-items:center;padding:40px 0 30px;">
                    <button class="start-btn" id="btn-start-focus" onclick="HomePage.startFocus()">
                        <span class="material-symbols-outlined">play_arrow</span>
                        <span>开始专注</span>
                    </button>
                    <p style="color:var(--text2);font-size:13px;margin-top:12px;" id="selected-duration-label">${Store.selectedMinutes} 分钟</p>
                </div>

                <div class="time-picker-container" style="max-width:340px;margin:0 auto;">
                    <div class="time-picker" id="time-picker"></div>
                    <div class="time-picker-label">分钟</div>
                </div>

                <div style="margin-top:30px;">
                    ${RankHelper.renderBar(goal.currentRank, goal.accumulatedMinutes, goal.totalMinutes)}
                </div>
            `;

            this.initTimePicker();
        },

        initTimePicker() {
            const container = document.getElementById('time-picker');
            if (!container) return;
            const frag = document.createDocumentFragment();
            for (let i = 5; i <= 180; i++) {
                const item = document.createElement('div');
                item.className = 'time-picker-item' + (i === Store.selectedMinutes ? ' selected' : '');
                item.textContent = i;
                item.onclick = () => this.selectMinute(i);
                frag.appendChild(item);
            }
            container.appendChild(frag);
            // Scroll to selected
            requestAnimationFrame(() => {
                const selected = container.querySelector('.selected');
                if (selected) {
                    const containerRect = container.getBoundingClientRect();
                    const selRect = selected.getBoundingClientRect();
                    container.scrollLeft = selRect.left - containerRect.left - containerRect.width / 2 + selRect.width / 2;
                }
            });
        },

        selectMinute(m) {
            Store.selectedMinutes = m;

        updateRankPreview(hours) {
            const thresholds = [
                { rank: 'BRONZE', percent: 0 }, { rank: 'SILVER', percent: 5 },
                { rank: 'GOLD', percent: 15 }, { rank: 'PLATINUM', percent: 30 },
                { rank: 'DIAMOND', percent: 50 }, { rank: 'STARRY', percent: 75 },
                { rank: 'KING', percent: 100 }
            ];
            const el = document.getElementById('rank-preview');
            if (!el) return;
            el.innerHTML = thresholds.map(t => {
                const mins = Math.max(1, Math.ceil(hours * 60 * t.percent / 100));
                return `<div class="rank-preview-item">
                    <div class="rank-preview-icon" style="background:${RankHelper.getColor(t.rank)}22;">
                        <span class="material-symbols-outlined" style="color:${RankHelper.getColor(t.rank)};">${RankHelper.getIcon(t.rank)}</span>

                    <div class="rank-preview-hours">${formatMinutes(mins)}</div>

            el.innerHTML = `

                        <p style="color:var(--red);font-size:11px;margin-bottom:40px;opacity:0.7;">不足5分钟的专注不计入累计</p>

                        <div style="display:flex;gap:16px;justify-content:center;">
                            <button class="btn-secondary" id="btn-pause" onclick="TimerPage.togglePause()" style="min-width:100px;">
                                <span class="material-symbols-outlined" style="font-size:20px;vertical-align:middle;margin-right:4px;">pause</span>暂停
                            </button>
                            <button class="btn-primary" onclick="TimerPage.endFocus()" style="min-width:100px;">
                                <span class="material-symbols-outlined" style="font-size:20px;vertical-align:middle;margin-right:4px;">stop</span>结束专注
                            </button>
                        </div>
                    </div>
                </div>`;
            el.classList.add('active');

            this.startCountdown(plannedSec);
        },

        startCountdown(totalSeconds) {
            clearInterval(Store.timerInterval);
            Store.isTimerRunning = true;
            Store.isTimerPaused = false;
            Store.timerPausedDuration = 0;
            const startTime = Date.now();

            Store.timerInterval = setInterval(() => {
                if (Store.isTimerPaused) return;
                const elapsed = Math.floor((Date.now() - startTime - Store.timerPausedDuration) / 1000);
                const remaining = Math.max(0, totalSeconds - elapsed);
                const display = document.getElementById('timer-display');
                if (display) display.textContent = formatTimerDisplay(remaining);
            }, 200);
        },

        togglePause() {
            const btn = document.getElementById('btn-pause');
            if (!btn) return;
            Store.isTimerPaused = !Store.isTimerPaused;
            if (Store.isTimerPaused) {
                Store.timerPausedAt = Date.now();
                btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:20px;vertical-align:middle;margin-right:4px;">play_arrow</span>继续';
            } else {
                Store.timerPausedDuration += Date.now() - Store.timerPausedAt;
                btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:20px;vertical-align:middle;margin-right:4px;">pause</span>暂停';
            }
        },

        async endFocus() {
            clearInterval(Store.timerInterval);
            Store.isTimerRunning = false;

            let pauseExtra = 0;
            if (Store.isTimerPaused && Store.timerPausedAt) {
                pauseExtra = Date.now() - Store.timerPausedAt;
            }
            const elapsed = Math.floor((Date.now() - Store.timerStartedAt - Store.timerPausedDuration - pauseExtra) / 1000);
            const actualMinutes = Math.max(0, Math.floor(elapsed / 60));

            try {
                const res = await Api.post(`/api/sessions/${Store.currentSession.sessionId}/end`, { actualMinutes });
                document.getElementById('page-focus-timer').classList.remove('active');
                await Store.loadGoals();

                if (res.data.rankChanged && res.data.isValid) {
                    FocusDonePage.rankUpData = res.data;
                    RankUpPage.show(res.data);
                } else {
                    FocusDonePage.show(res.data);
                }
            } catch(e) { Toast.show(e.message); }
        },

        hide() {
            clearInterval(Store.timerInterval);
            Store.isTimerRunning = false;
            document.getElementById('page-focus-timer').classList.remove('active');
        }
    };

                            <span class="material-symbols-outlined">download</span>
                            <span class="settings-label">数据导出</span>
                        </div>
                        <div class="settings-right"><span class="material-symbols-outlined">chevron_right</span></div>
                    </div>
                    <div class="settings-item" onclick="Toast.show('即将上线，敬请期待')">
                        <div class="settings-left">
                            <span class="material-symbols-outlined">dark_mode</span>
                            <span class="settings-label">深色模式</span>
                        </div>
                        <div class="settings-right" style="font-size:12px;">已开启</div>
                    </div>
                    <div class="settings-item" onclick="Toast.show('专注大师 v1.0.0')">
                        <div class="settings-left">
                            <span class="material-symbols-outlined">info</span>
                            <span class="settings-label">关于</span>
                        </div>
                        <div class="settings-right"><span class="material-symbols-outlined">chevron_right</span></div>
                    </div>
                </div>
            `;
        },

        async editNickname() {
            const currentName = document.getElementById('user-nickname-display').textContent;
            const newName = prompt('请输入新昵称', currentName);
            if (!newName || !newName.trim()) return;
            try {
                await Api.put('/api/user/profile', { nickname: newName.trim() });
                Toast.show('昵称修改成功');
                this.render();
            } catch(e) { Toast.show(e.message); }
        }
    };

    // ==================== Init ====================
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
    Router.init();
    </script>
</body>
</html>
